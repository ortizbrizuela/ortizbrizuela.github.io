# website settings
website:
  favicon: img/logo.png
  title: "Edgar Ortiz-Brizuela"
  description: "M.D., M.Sc., Ph.D. student in Epidemiology (McGill University)"   # A brief slogan (optional)
  image: img/my_image.jpg
  

  
  # start of the navigation bar at the top of the website
  navbar:
    pinned: true
    logo: /img/logo.png
    
    # your sub-pages
    left:
      - text: "Projects"
        href: projects/index.qmd
      - text: "CV"
        href: cv/index.qmd
    
    # your social media handles
    right:
      - icon: google
        href: https://scholar.google.com/citations?hl=es&user=rYaloZcAAAAJ
      - icon: twitter
        href: https://twitter.com/OrtizBrizuelaE
      - icon: linkedin
        href: https://ca.linkedin.com/in/ortiz-brizuela
      - icon: envelope
        aria-label: email
        href: "mailto:edgar.ortiz-brizuela@mail.mcgill.ca"  
  
  

# Don't touch unless you know what you are doing :) ------------
  search: 
    location: navbar
    type: textbox

project:
  type: website
  output-dir: docs

  preview: 
    port: 22222
    browser: true
    watch-inputs: true
    navigate: true

execute:
  freeze: true

format:
  html:
    fontsize: 1.0em
    theme: 
      - pulse
      - html/styles.scss
    toc: false
    code-link: true
    anchor-sections: true
    fig-cap-location: margin
    reference-location: margin
    footnotes-hover: true